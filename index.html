<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dream Factory - Enhanced Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/favicon.ico">
</head>
<body>
    <div class="container">
        <div class="header">
            <h3><i class="fas fa-industry"></i> My Dream Factory</h3>
        </div>

        <div class="stats">
            <div class="stat-box">
                <i class="fas fa-coins"></i>
                <div>Capital</div>
                <div id="money">$500</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-star"></i>
                <div>Brand Value</div>
                <div id="brand">0</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-cogs"></i>
                <div>Production</div>
                <div id="production-rate">1.0/s</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-percentage"></i>
                <div>Efficiency</div>
                <div id="efficiency">100%</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="actions">
                <div class="inventory">
                    <h4><i class="fas fa-warehouse"></i> Inventory</h4>
                    <div>Raw Materials: <span id="raw-materials">0</span> / <span id="max-storage">100</span></div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="raw-materials-bar"></div>
                    </div>
                    <div>Products: <span id="products">0</span> / <span id="max-products">100</span></div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="products-bar"></div>
                    </div>
                    
                    <div class="raw-materials-buttons">
                        <button class="action-btn" onclick="buyRawMaterials(10)">
                            <i class="fas fa-shopping-cart"></i> Buy 10 ($50)
                        </button>
                        <button class="action-btn" onclick="buyRawMaterials(50)">
                            <i class="fas fa-shopping-cart"></i> Buy 50 ($250)
                        </button>
                        <button class="action-btn" onclick="buyRawMaterials(100)">
                            <i class="fas fa-shopping-cart"></i> Buy 100 ($500)
                        </button>
                    </div>
                </div>

                <button class="action-btn" onclick="sellProducts()">
                    <i class="fas fa-dollar-sign"></i> Sell Products
                </button>
                <button class="action-btn" onclick="hireWorker()">
                    <i class="fas fa-user-plus"></i> Hire Worker ($200)
                </button>
                <button class="action-btn" onclick="hireMarketer()">
                    <i class="fas fa-bullhorn"></i> Hire Marketer ($300)
                </button>
                <button class="action-btn" onclick="hireSalesman()">
                    <i class="fas fa-user-tie"></i> Hire Salesman ($400)
                </button>
                <button class="action-btn" onclick="runAdvertising()">
                    <i class="fas fa-ad"></i> Run Advertising ($100)
                </button>
                <button class="action-btn" onclick="upgradeFactory()">
                    <i class="fas fa-industry"></i> Upgrade Factory ($1000)
                </button>
                <button class="action-btn" onclick="upgradeStorage()">
                    <i class="fas fa-warehouse"></i> Upgrade Storage ($500)
                </button>
                <button class="action-btn" onclick="motivateEmployees()">
                    <i class="fas fa-heart"></i> Motivate Employees ($100)
                </button>
            </div>

            <div>
                <div class="employees">
                    <h4><i class="fas fa-users"></i> Employees</h4>
                    <div id="employees-list"></div>
                </div>

                <div class="bank">
                    <h4><i class="fas fa-university"></i> Bank</h4>
                    <div>Available Credit: $<span id="available-credit">5000</span></div>
                    <div>Current Debt: $<span id="current-credit">0</span></div>
                    <div>Interest Rate: <span id="interest-rate">10</span>%</div>
                    <button class="action-btn" onclick="takeCredit()">
                        <i class="fas fa-hand-holding-usd"></i> Take Credit ($1000)
                    </button>
                    <button class="action-btn" onclick="payCredit()">
                        <i class="fas fa-money-bill-wave"></i> Pay Credit ($100)
                    </button>
                </div>
            </div>
        </div>

        <div class="achievements">
            <h4><i class="fas fa-trophy"></i> Achievements</h4>
            <div id="achievements-list"></div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button class="action-btn" onclick="githubLink()">
                <i class="fab fa-github"></i> View Developer on GitHub
            </button>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="general.js"></script>
</body>
</html>
